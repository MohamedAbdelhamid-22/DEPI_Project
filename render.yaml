services:
  - type: web
    name: depi-django-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn project.wsgi:application
    workingDir: project  # 👈 This line fixes the import error
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: polymind
          property: connectionString

databases:
  - name: polymind  # 👈 This should match the name above ("depi-db"), not "polymind"
    databaseName: polymind
    user: postgres
    password: 123456789
