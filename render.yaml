services:
  - type: web
    name: depi-django-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn project.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: depi-db
          property: connectionString

databases:
  - name: polymind
    databaseName: polymind
    user: POSTGRESQL 17
    password: 123456789  # Render will automatically generate a password if you don't provide one
